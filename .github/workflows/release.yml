name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for retry/fix), e.g. v0.2.0"
        required: true
        type: string

jobs:
  tauri:
    name: Tauri Release
    permissions:
      contents: write
    runs-on: macos-14

    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi

          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build bundled daemon binary
        run: |
          GOOS=darwin GOARCH=arm64 make build VERSION="${RELEASE_VERSION}" OUTPUT=/tmp/attn
          mkdir -p app/src-tauri/binaries
          cp /tmp/attn "app/src-tauri/binaries/attn-aarch64-apple-darwin"

      - name: Import Apple signing credentials
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD APPLE_API_ISSUER APPLE_API_KEY APPLE_API_KEY_P8; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var"
              exit 1
            fi
          done

          CERT_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | tr -d '\n\r' | openssl base64 -d -A -out "$CERT_PATH"
          printf '%s' "$APPLE_API_KEY_P8" | tr -d '\n\r' | openssl base64 -d -A -out "$KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -f pkcs12 -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -nE 's/.*"([^"]+)".*/\1/p' | grep 'Developer ID Application:' | head -n1)"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "Developer ID Application identity not found in imported keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "NOTARY_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_INSTALL_CHANNEL: release
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: app
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: attn ${{ env.RELEASE_TAG }}
          releaseBody: See CHANGELOG.md for details.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin

      - name: Repackage notarized app and replace release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          NOTARY_API_KEY_PATH: ${{ env.NOTARY_API_KEY_PATH }}
        run: |
          APP_PATH="$(find app/src-tauri/target -type d -name 'attn.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then
            echo "No attn.app bundle found in build output"
            exit 1
          fi

          VERSION="${RELEASE_TAG#v}"
          WORK_DIR="$(mktemp -d)"
          cp -R "$APP_PATH" "$WORK_DIR/attn.app"

          codesign --verify --deep --strict --verbose=2 "$WORK_DIR/attn.app"
          spctl -a -t exec -vv "$WORK_DIR/attn.app"

          APP_ZIP="$WORK_DIR/attn.app.zip"
          ditto -c -k --keepParent "$WORK_DIR/attn.app" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --key "$NOTARY_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$WORK_DIR/attn.app"
          xcrun stapler validate "$WORK_DIR/attn.app"

          DMG_REBUILT="$WORK_DIR/attn_${VERSION}_aarch64.dmg"
          hdiutil create -volname "attn" -srcfolder "$WORK_DIR/attn.app" -format UDZO "$DMG_REBUILT"
          xcrun notarytool submit "$DMG_REBUILT" \
            --key "$NOTARY_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple "$DMG_REBUILT"
          xcrun stapler validate "$DMG_REBUILT"

          (cd "$WORK_DIR" && tar -czf "attn_aarch64.app.tar.gz" attn.app)
          APP_TAR="$WORK_DIR/attn_aarch64.app.tar.gz"

          gh release upload "${RELEASE_TAG}" "$DMG_REBUILT" --clobber
          gh release upload "${RELEASE_TAG}" "$APP_TAR" --clobber
          echo "DMG_REBUILT=$DMG_REBUILT" >> "$GITHUB_ENV"

      - name: Upload stable DMG alias for Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${DMG_REBUILT:-}" ]; then
            echo "Rebuilt DMG path not available"
            exit 1
          fi
          cp "$DMG_REBUILT" /tmp/attn_aarch64.dmg
          gh release upload "${RELEASE_TAG}" /tmp/attn_aarch64.dmg --clobber

      - name: Clean up Apple signing credentials
        if: always()
        run: |
          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$APPLE_KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/apple-certificate.p12"
          if [ -n "${NOTARY_API_KEY_PATH:-}" ]; then
            rm -f "$NOTARY_API_KEY_PATH"
          fi

  linux-amd64:
    name: Linux amd64 daemon
    needs: tauri
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi

          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Linux amd64 daemon
        run: |
          GOOS=linux GOARCH=amd64 make build VERSION="${RELEASE_VERSION}" OUTPUT=/tmp/attn-linux-amd64

      - name: Validate Linux amd64 daemon
        run: |
          /tmp/attn-linux-amd64 --version
          file /tmp/attn-linux-amd64

      - name: Upload Linux amd64 daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RELEASE_TAG}" /tmp/attn-linux-amd64 --clobber

  linux-arm64:
    name: Linux arm64 daemon
    needs: tauri
    permissions:
      contents: write
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi

          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG"
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Linux arm64 daemon
        run: |
          GOOS=linux GOARCH=arm64 make build VERSION="${RELEASE_VERSION}" OUTPUT=/tmp/attn-linux-arm64

      - name: Validate Linux arm64 daemon
        run: |
          /tmp/attn-linux-arm64 --version
          file /tmp/attn-linux-arm64

      - name: Upload Linux arm64 daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${RELEASE_TAG}" /tmp/attn-linux-arm64 --clobber
