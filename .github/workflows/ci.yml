name: CI

on:
  push:
    branches: [main, 'epic/**']
  pull_request:
    branches: [main, 'epic/**']

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      daemon: ${{ steps.filter.outputs.daemon }}
      frontend: ${{ steps.filter.outputs.frontend }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v4

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            daemon:
              - '**/*.go'
              - 'cmd/**'
              - 'internal/**'
              - 'test/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'scripts/source-fingerprint.sh'
              - '.github/workflows/ci.yml'
            frontend:
              - 'app/src/**'
              - 'app/e2e/**'
              - 'app/test-harness/**'
              - 'app/public/**'
              - 'app/index.html'
              - 'app/package.json'
              - 'app/pnpm-lock.yaml'
              - 'app/playwright.config.ts'
              - 'app/tsconfig*.json'
              - 'app/vite.config.ts'
              - 'internal/protocol/schema/**'
              - '.github/workflows/ci.yml'
            tauri:
              - 'app/src-tauri/**'
              - '.github/workflows/ci.yml'
  backend:
    name: Daemon
    needs: changes
    if: needs.changes.outputs.daemon == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # internal/ghosttyvt links libghostty-vt via cgo on Linux; fetch the
      # prebuilt native archive (download-first, no zig) so vet/build/test link.
      - name: Ensure native VT library
        run: ./scripts/build-libghostty-vt.sh

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Run 'gofmt -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: ./scripts/test-go.sh

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run build

      - name: Test
        run: pnpm test

  # E2E runs apart from the unit job so the two overlap instead of stacking.
  # Each shard is its own runner with its own throwaway daemon + Vite server,
  # so the shared-daemon constraint that forces workers:1 in playwright.config
  # still holds within a shard.
  frontend-e2e:
    name: Frontend E2E (${{ matrix.shard }}/3)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build attn binary
        run: |
          cd ..
          ./scripts/build-libghostty-vt.sh
          go build -o /tmp/attn ./cmd/attn

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      # The suite only runs chromium (no projects configured), so skip the
      # firefox/webkit downloads. On a cache hit only the OS packages are needed.
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: E2E
        env:
          ATTN_E2E_BIN: /tmp/attn
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/3

  # Single stable check name over the shard matrix, for branch-protection
  # rulesets. Green when all shards pass or the frontend filter skipped them.
  frontend-e2e-gate:
    name: Frontend E2E
    needs: frontend-e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check shard results
        run: |
          result="${{ needs.frontend-e2e.result }}"
          echo "shards result: $result"
          [ "$result" = "success" ] || [ "$result" = "skipped" ]

  rust:
    name: Tauri
    needs: changes
    if: needs.changes.outputs.tauri == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libclang-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build attn binary
        run: |
          cd ../..
          ./scripts/build-libghostty-vt.sh
          go build -o /tmp/attn ./cmd/attn
          target_triple="$(rustc -vV | awk '/host:/ {print $2}')"
          mkdir -p app/src-tauri/binaries
          cp /tmp/attn "app/src-tauri/binaries/attn-${target_triple}"
          cd app/src-tauri

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Cargo test
        run: cargo test
