name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      daemon: ${{ steps.filter.outputs.daemon }}
      frontend: ${{ steps.filter.outputs.frontend }}
      tauri: ${{ steps.filter.outputs.tauri }}
      native_ui: ${{ steps.filter.outputs.native_ui }}
    steps:
      - uses: actions/checkout@v4

      - name: Classify changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            daemon:
              - '**/*.go'
              - 'cmd/**'
              - 'internal/**'
              - 'test/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'scripts/source-fingerprint.sh'
              - '.github/workflows/ci.yml'
            frontend:
              - 'app/src/**'
              - 'app/e2e/**'
              - 'app/test-harness/**'
              - 'app/public/**'
              - 'app/index.html'
              - 'app/package.json'
              - 'app/pnpm-lock.yaml'
              - 'app/playwright.config.ts'
              - 'app/tsconfig*.json'
              - 'app/vite.config.ts'
              - 'internal/protocol/schema/**'
              - '.github/workflows/ci.yml'
            tauri:
              - 'app/src-tauri/**'
              - '.github/workflows/ci.yml'
            native_ui:
              - 'native-ui/**'
              - 'internal/protocol/schema/**'
              - 'app/scripts/real-app-harness/scenario-native-canvas.mjs'
              - '.github/workflows/ci.yml'

  backend:
    name: Daemon
    needs: changes
    if: needs.changes.outputs.daemon == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Run 'gofmt -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Build attn binary
        run: |
          cd ..
          go build -o /tmp/attn ./cmd/attn
          target_triple="x86_64-unknown-linux-gnu"
          mkdir -p app/src-tauri/binaries
          cp /tmp/attn "app/src-tauri/binaries/attn-${target_triple}"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: E2E
        env:
          ATTN_E2E_BIN: /tmp/attn
        run: pnpm run e2e

  rust:
    name: Tauri
    needs: changes
    if: needs.changes.outputs.tauri == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libclang-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build attn binary
        run: |
          cd ../..
          go build -o /tmp/attn ./cmd/attn
          target_triple="$(rustc -vV | awk '/host:/ {print $2}')"
          mkdir -p app/src-tauri/binaries
          cp /tmp/attn "app/src-tauri/binaries/attn-${target_triple}"
          cd app/src-tauri

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Cargo test
        run: cargo test

  native-ui:
    name: Native UI
    needs: changes
    if: needs.changes.outputs.native_ui == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: native-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
