name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: shitty-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft && !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: victorarias/shitty-reviewing-agent@f01189202eeff4e5c3f79176368cbbc1cac4d914
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          provider: openrouter
          api-key: ${{ secrets.OPEN_ROUTER_API_KEY }}
          model: qwen/qwen3.6-plus
          reasoning: xhigh
          max-files: 200
          debug: "true"
